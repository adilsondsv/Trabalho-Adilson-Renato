    <header id="titulo_principal">

    <div class="container_contato">
     <fieldset class="contato"><strong>
        <label for="nomepessoa">Nome:</label>
        <input type="text" name="nomepessoa" 
        id="nomepessoa" minlenght="3" maxlength="15"
        required placeholder="Informe seu nome"><br><br>

        <label for="email">Email:</label>
        <input type="email" name="email" id="email" placeholder="Informe seu email" required><br><br>
        
        <label>Ano de nascimento:</label>
        <input type="number" id="Ano" name="ano" max="2026" min="1900" placeholder=""><br><br>

        <label>Telefone:</label>
        <input type="tel" name="telefone" id="telefone" placeholder="Informe seu telefone"><br><br>
        
        <label for="senha">Informe sua senha:</label>
        <input type="password" id="senha" name="senha"><br><br>

        <button type="submit" class="botao_enviar">Enviar</button>
        <button type="reset" class="botao_enviar">Limpar</button>
     </fieldset></strong>
    </div><br><br><br><br>

    <div class="logo_direita_container">
    <footer class="email">
          <label for="email"><strong>Entre na nossa lista e receba coleções exclusivas:</strong></label>
        <input type="email" name="email" id="email" required placeholder="Informe seu email">
         <button type="submit" class="botao_enviar">Enviar</button>
    </footer>
